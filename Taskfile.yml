version: "3"

vars:
  GOLANGCI_LINT_VERSION: v2.12.2
  GOVULNCHECK_VERSION: v1.6.0
  GOSEC_VERSION: v2.27.1
  GITLEAKS_VERSION: v8.30.1
  COVERAGE_VERSION: v2.18.8
  MCP_INSPECTOR_VERSION: 0.22.0

tasks:
  tools:
    desc: Install the pinned quality and security tools
    cmds:
      - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}
      - go install golang.org/x/vuln/cmd/govulncheck@{{.GOVULNCHECK_VERSION}}
      - go install github.com/securego/gosec/v2/cmd/gosec@{{.GOSEC_VERSION}}
      - go install github.com/zricethezav/gitleaks/v8@{{.GITLEAKS_VERSION}}
      - go install github.com/vladopajic/go-test-coverage/v2@{{.COVERAGE_VERSION}}

  test:
    desc: Run tests with the race detector
    cmds:
      - go test -race ./...

  lint:
    desc: Run configured Go linters and formatters
    cmds:
      - golangci-lint run

  vulnerability:
    desc: Verify modules and check known Go vulnerabilities
    cmds:
      - go mod verify
      - govulncheck ./...

  security:
    desc: Run static security and secret checks
    cmds:
      - gosec -concurrency=1 ./...
      - gitleaks dir --redact --no-banner .

  coverage:
    desc: Generate coverage and enforce the configured threshold
    cmds:
      - go test ./... -coverprofile=coverage.out -covermode=atomic -coverpkg=./...
      - go-test-coverage --config=./testcoverage.yml

  mcp-inspector:
    desc: Start the official MCP Inspector
    cmds:
      - npx -y @modelcontextprotocol/inspector@{{.MCP_INSPECTOR_VERSION}}

  verify:
    desc: Run the complete local verification suite
    cmds:
      - test -z "$(gofmt -l .)"
      - go vet ./...
      - go test -race ./...
      - go test ./... -coverprofile=coverage.out -covermode=atomic -coverpkg=./...
      - go-test-coverage --config=./testcoverage.yml
      - golangci-lint run
      - go mod verify
      - govulncheck ./...
      - gosec -concurrency=1 ./...
      - gitleaks dir --redact --no-banner .
