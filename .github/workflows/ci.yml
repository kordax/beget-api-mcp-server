name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true
      - name: verify formatting
        run: test -z "$(gofmt -l .)"
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race -coverprofile=coverage.out ./...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: error

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true
      - uses: actions/cache@v5
        id: security-tools
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-security-tools-govulncheck-1.6.0-gosec-2.27.1-gitleaks-8.30.1
      - name: install security tools
        if: steps.security-tools.outputs.cache-hit != 'true'
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          go install github.com/securego/gosec/v2/cmd/gosec@v2.27.1
          go install github.com/zricethezav/gitleaks/v8@v8.30.1
      - name: verify modules
        run: go mod verify
      - name: check vulnerabilities
        run: govulncheck ./...
      - name: analyze Go security
        run: gosec -concurrency=1 ./...
      - name: detect committed secrets
        run: gitleaks git --redact --no-banner
