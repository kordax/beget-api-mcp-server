name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26.5"
          cache: true
      - name: build release archives
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -eu
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            goos=${target%/*}
            goarch=${target#*/}
            name="beget-api-mcp-server_${VERSION}_${goos}_${goarch}"
            binary="beget-api-mcp-server"
            if [ "$goos" = "windows" ]; then
              binary="${binary}.exe"
            fi
            mkdir -p "dist/${name}"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build \
              -trimpath \
              -ldflags "-s -w -X github.com/kordax/beget-api-mcp-server/internal/buildinfo.Version=${VERSION#v}" \
              -o "dist/${name}/${binary}" \
              ./cmd/beget-api-mcp-server
            cp LICENSE README.md README.en.md "dist/${name}/"
            cp -R skills "dist/${name}/"
            if [ "$goos" = "windows" ]; then
              (cd dist && zip -qr "${name}.zip" "${name}")
            else
              tar -C dist -czf "dist/${name}.tar.gz" "${name}"
            fi
            rm -rf "dist/${name}"
          done
          (cd dist && sha256sum ./*.tar.gz ./*.zip > checksums.txt)
      - name: publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
